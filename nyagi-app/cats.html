<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <script>
  (function(){if(!navigator.serviceWorker)return;navigator.serviceWorker.getRegistrations().then(function(r){for(var i=0;i<r.length;i++){r[i].update();if(r[i].waiting)r[i].waiting.postMessage({type:'SKIP_WAITING'})}});var f=!1;navigator.serviceWorker.addEventListener('controllerchange',function(){if(!f){f=!0;location.reload()}})})();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <title>NYAGI 猫一覧</title>
  <link rel="manifest" href="manifest.json?v=214">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="style.css?v=209">
  <script src="js/nyagi-fixed-header.js?v=209" defer></script>
  <script src="js/nyagi-cache-clear.js?v=209" defer></script>
  <link rel="stylesheet" href="voice-console.css?v=214">
  <style>
    /* モバイルスクロール対応: 専用スクロールコンテナ */
    html, body { height: 100%; overflow: hidden; margin: 0; }
    body { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; }
    /* ヘッダーは style.css の position:fixed（本文は .page-scroll のみスクロール） */
    .page-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 0 16px 80px;
      padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
    }

    /* ── モード切替トグル ── */
    .mode-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid var(--primary);
    }
    .mode-toggle button {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .mode-toggle button.active {
      background: var(--primary);
      color: #fff;
    }

    /* ── 猫ごとカード（モード1） ── */
    .cat-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .per-cat-card {
      background: var(--surface);
      border-radius: 10px;
      padding: 0 12px 14px;
      cursor: pointer;
      transition: transform 0.1s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      /* overflow:hidden は本文の見切れの原因になり得るため付けない */
    }
    .per-cat-card:active { transform: scale(0.98); }

    /* 猫ごと: 名前をカード先頭の帯で強調（スクロールに追従しない） */
    .pcc-header {
      position: relative;
      z-index: 1;
      display: block;
      margin: 0 -12px 12px;
      padding: 16px 52px 16px 14px;
      border-radius: 10px 10px 0 0;
      background: linear-gradient(135deg, rgba(233, 69, 96, 0.32) 0%, rgba(15, 52, 96, 0.92) 48%, rgba(22, 33, 62, 1) 100%);
      border-bottom: 1px solid rgba(233, 69, 96, 0.45);
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.06), 0 4px 12px rgba(0, 0, 0, 0.25);
    }
    .pcc-name {
      font-size: clamp(18px, 4.8vw, 22px);
      font-weight: 800;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px 8px;
      text-align: center;
      line-height: 1.35;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.45);
      color: #fff;
    }
    .pcc-name .badge {
      letter-spacing: 0;
    }
    .pcc-score {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      font-size: clamp(17px, 4.2vw, 21px);
      font-weight: 800;
      min-width: 2em;
      text-align: center;
      line-height: 1.1;
      padding: 4px 8px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .pcc-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px 10px;
      font-size: 13px;
      width: 100%;
      min-width: 0;
    }
    .pcc-metric-label {
      color: var(--text-dim);
      font-size: 11px;
    }
    .pcc-metric-value {
      font-weight: 600;
    }

    .pcc-med-block {
      grid-column: 1 / -1;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 6px;
      margin-top: 2px;
    }
    .pcc-med-block .pcc-metric-value { margin-bottom: 4px; }
    .pcc-med-block .ov-med-item-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      font-size: 13px;
      cursor: pointer;
    }
    .pcc-med-block .ov-med-item-row .ov-med-item-text {
      flex: 1; min-width: 0; word-break: break-word; line-height: 1.35;
    }

    /* グリッド外の全幅ブロック（狭い列に誤って入ると1文字ずつ折り返して縦に見える） */
    .pcc-feed-yesterday-wrap {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
      writing-mode: horizontal-tb;
      text-orientation: mixed;
      flex: 0 0 auto;
      margin: 10px 0 0;
      padding: 8px 10px;
      background: rgba(251, 191, 36, 0.08);
      border-radius: 8px;
      border: 1px solid rgba(251, 191, 36, 0.2);
    }
    .pcc-feed-yesterday-title {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 6px;
      writing-mode: horizontal-tb;
      white-space: normal;
      word-break: normal;
      overflow-wrap: break-word;
      line-height: 1.35;
      display: block;
    }

    /* ── 項目ごとカード（モード2） ── */
    .item-card {
      background: var(--surface);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .item-card-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 0;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
      -webkit-user-select: none;
    }
    .item-card-title::after {
      content: '▲';
      font-size: 11px;
      opacity: 0.5;
      transition: transform 0.2s;
    }
    .item-card-title.collapsed::after {
      transform: rotate(180deg);
    }
    /* max-height を小さくすると項目ごとカード内で猫行が途中で切れる（ごはんは行数が多い） */
    .item-card-body {
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.2s ease;
      max-height: 200000px;
      opacity: 1;
      margin-top: 10px;
    }
    .item-card-body.hidden {
      max-height: 0;
      opacity: 0;
      margin-top: 0;
    }
    .item-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 13px;
      cursor: pointer;
    }
    /* 項目ごと・読取専用行（異常・医療など）も猫名を同じ帯スタイルに */
    .item-card-body > a.item-row {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      padding: 10px 0;
    }
    .item-card-body > a.item-row .item-cat-name {
      justify-content: center;
      text-align: center;
      font-size: clamp(17px, 4.5vw, 20px);
      font-weight: 800;
      letter-spacing: 0.04em;
      min-width: 0;
      width: 100%;
      padding: 12px 14px;
      box-sizing: border-box;
      border: 1px solid rgba(233, 69, 96, 0.4);
      border-radius: 10px;
      border-bottom-width: 2px;
      border-bottom-color: rgba(233, 69, 96, 0.55);
      background: linear-gradient(180deg, rgba(233, 69, 96, 0.22) 0%, rgba(22, 33, 62, 0.85) 100%);
      color: #fff;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
    }
    .item-card-body > a.item-row .item-values {
      width: 100%;
      max-width: 100%;
    }
    .item-row:last-child { border-bottom: none; }
    .item-row:active { opacity: 0.7; }
    .item-cat-name {
      font-weight: 600;
      min-width: 60px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .item-values {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 8px;
    }

    .item-row-editable {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 6px 8px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 13px;
    }
    .item-row-editable:last-child { border-bottom: none; }
    .item-row-editable .item-cat-link {
      text-decoration: none;
      color: inherit;
      font-weight: 600;
      min-width: 60px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      -webkit-tap-highlight-color: rgba(255,255,255,0.1);
    }
    /* 項目ごと: 猫名を1行目・本文を下に回して横幅を確保（はみ出し防止） */
    .item-card .item-row-editable {
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
    }
    /* 項目ごと: 猫名を中央・大きめ・帯背景で区切り（どの猫の行か瞬時に判別） */
    .item-card .item-row-editable .item-cat-link {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      box-sizing: border-box;
      justify-content: center;
      text-align: center;
      font-size: clamp(17px, 4.5vw, 20px);
      font-weight: 800;
      letter-spacing: 0.04em;
      padding: 12px 14px;
      margin: 0 0 6px;
      border: 1px solid rgba(233, 69, 96, 0.4);
      border-radius: 10px;
      border-bottom-width: 2px;
      border-bottom-color: rgba(233, 69, 96, 0.55);
      background: linear-gradient(180deg, rgba(233, 69, 96, 0.22) 0%, rgba(22, 33, 62, 0.85) 100%);
      color: #fff;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
    }
    .item-card .item-row-editable .item-values {
      flex: none;
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }
    .item-card .item-row-editable .item-inline-edit {
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }
    .item-row-editable .item-cat-link:active { opacity: 0.75; }
    .item-inline-edit {
      flex: 1 1 100%;
      margin-top: 2px;
      padding-top: 6px;
      border-top: 1px dashed rgba(255,255,255,0.08);
    }
    .inline-form {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }
    /* 項目ごとカード内フォーム: 1行に詰めず折り返し、ボタンは内容幅 */
    .item-card-body .inline-form {
      gap: 8px;
      align-items: flex-start;
    }
    .item-card-body .inline-form .ov-inline-select,
    .item-card-body .inline-form .ov-inline-date,
    .item-card-body .inline-form .ov-inline-num {
      flex: 1 1 42%;
      min-width: 0;
      max-width: 100%;
      box-sizing: border-box;
    }
    .item-card-body .inline-form .btn,
    .item-card-body .inline-form .btn-primary,
    .item-card-body .inline-form .btn-outline {
      flex: 0 0 auto !important;
      width: auto !important;
      max-width: 100%;
      min-width: 0;
      padding: 5px 12px !important;
      font-size: 11px !important;
      font-weight: 600;
      line-height: 1.25;
      white-space: normal;
      word-break: keep-all;
      overflow-wrap: break-word;
      min-height: 34px;
    }
    .ov-inline-select,
    .ov-inline-date,
    .ov-inline-num {
      font-size: 12px;
      padding: 4px 6px;
      border-radius: 6px;
      background: var(--surface-alt, rgba(255,255,255,0.06));
      color: var(--text-main, #fff);
      border: 1px solid rgba(255,255,255,0.12);
      max-width: 100%;
    }
    .ov-inline-select { min-height: 30px; }
    .item-values-medcol {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 0;
      width: 100%;
    }
    .item-card-body .item-values-medcol {
      overflow-x: hidden;
    }
    .ov-task-line {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      margin-top: 4px;
      padding-top: 4px;
      border-top: 1px dashed rgba(255,255,255,0.06);
    }
    .ov-task-line:first-of-type { margin-top: 2px; padding-top: 0; border-top: none; }
    .ov-task-overdue-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      color: #fecaca;
      background: #7f1d1d;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
      white-space: nowrap;
      vertical-align: middle;
    }
    .item-card-body .ov-task-line {
      flex-direction: column;
      align-items: stretch;
      gap: 6px;
    }
    .item-card-body .ov-task-head {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 4px 8px;
      width: 100%;
      min-width: 0;
    }
    .item-card-body .ov-task-head .ov-task-title {
      flex: 1 1 12rem;
      min-width: 0;
    }
    .item-card-body .ov-task-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }
    .item-card-body .ov-task-actions .btn {
      width: auto !important;
      flex: 0 0 auto !important;
    }
    .ov-feed-block { gap: 6px !important; }
    /* ごはんカード内: 共通 .btn の width:100%・大パディングを打ち消し（コンパクトなチップ型） */
    .ov-feed-block .btn,
    .ov-feed-block a.btn {
      width: auto !important;
      max-width: 100%;
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 3px 9px !important;
      font-size: 11px !important;
      font-weight: 600;
      line-height: 1.25;
      border-radius: 5px;
      min-height: 0;
      gap: 3px;
    }
    .ov-feed-block .btn-outline { border-width: 1px; }
    .ov-feed-block .btn.btn-ov-feed-delmemo {
      padding: 1px 6px !important;
      font-size: 10px !important;
      color: #f87171 !important;
      border-color: rgba(248, 113, 113, 0.45) !important;
    }
    .ov-feed-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 6px;
      margin-bottom: 4px;
      width: 100%;
    }
    .ov-feed-toolbar .btn,
    .ov-feed-toolbar a.btn {
      flex: 0 0 auto !important;
    }
    .ov-feed-line {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 6px 8px;
      font-size: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 5px;
    }
    .ov-feed-line:first-child { border-top: none; padding-top: 0; }
    /* 摂取率が 0 以外で記録されている行：献立名・枠までグレー（％だけでは .dim と差が付かないため） */
    .ov-feed-line.ov-feed-line--has-eaten-pct .ov-feed-slot,
    .ov-feed-line.ov-feed-line--has-eaten-pct .ov-feed-menu {
      color: #6b7280 !important;
    }
    .ov-feed-line.ov-feed-line--has-eaten-pct .ov-feed-status,
    .ov-feed-line.ov-feed-line--has-eaten-pct .ov-feed-status .dim {
      color: #6b7280 !important;
    }
    .ov-feed-slot { font-weight: 700; min-width: 2.2em; color: rgba(255,255,255,0.88); flex-shrink: 0; }
    .ov-feed-menu { flex: 1 1 100px; min-width: 0; line-height: 1.35; font-size: 12px; }
    .ov-feed-status {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 4px 6px;
      font-size: 11px;
      flex: 0 0 auto;
      width: max-content;
      max-width: 100%;
      min-width: 0;
      margin-left: auto;
      text-align: right;
    }
    .ov-feed-status .btn,
    .ov-feed-status a.btn {
      flex: 0 0 auto !important;
      width: auto !important;
    }
    /* ごはん: 1行目＝枠＋献立、2行目＝ステータス・ボタン（横長ボタン防止） */
    .item-card-body .ov-feed-line {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      grid-template-areas:
        "slot menu"
        "status status";
      column-gap: 10px;
      row-gap: 6px;
      align-items: start;
    }
    .item-card-body .ov-feed-slot { grid-area: slot; }
    .item-card-body .ov-feed-menu {
      grid-area: menu;
      min-width: 0;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .item-card-body .ov-feed-status {
      grid-area: status;
      margin-left: 0;
      width: 100%;
      max-width: 100%;
      justify-content: flex-start;
      box-sizing: border-box;
    }
    .feed-done { color: #9d9; }
    .feed-pending { color: rgba(255,255,255,0.5); }
    .ov-task-title { flex: 1 1 120px; min-width: 0; line-height: 1.35; }
    .btn-ov-task-done, .btn-ov-task-skip, .btn-ov-med-skip {
      font-size: 10px !important;
      padding: 2px 8px !important;
      flex-shrink: 0;
    }

    .item-values-excretion {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 0;
      width: 100%;
    }
    .ov-ex-row {
      padding: 4px 0;
      border-bottom: 1px dashed rgba(255,255,255,0.06);
    }
    .ov-ex-row:last-child { border-bottom: none; }
    /* 排便・排尿: 当日以外の行は本文をグレー（cat.html 詳細の stool-row-past と同趣旨） */
    .ov-ex-row.ov-ex-row-past .ov-ex-text { color: #94a3b8; }
    .ov-ex-row.ov-ex-row-past .source-badge { color: #94a3b8 !important; opacity: 0.9; }
    .ov-ex-display {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }
    .item-card-body .ov-ex-display {
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }
    .item-card-body .ov-ex-display .btn-ov-hr-edit,
    .item-card-body .ov-ex-display .btn-ov-hr-del {
      align-self: flex-start;
    }
    .ov-ex-text { flex: 1 1 140px; min-width: 0; font-size: 12px; line-height: 1.35; }
    .item-card-body .ov-ex-text {
      width: 100%;
      flex: none;
    }
    .btn-ov-hr-edit, .btn-ov-hr-del, .btn-ov-hr-cancel {
      font-size: 10px !important;
      padding: 2px 8px !important;
    }
    .ov-ex-edit {
      display: none;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }
    .item-card-body .ov-ex-edit {
      flex-direction: column;
      align-items: stretch;
    }
    .item-card-body .ov-ex-edit .btn,
    .item-card-body .ov-ex-edit .btn-primary {
      width: auto !important;
      align-self: flex-start;
    }
    .ov-ex-row.is-editing .ov-ex-display { display: none; }
    .ov-ex-row.is-editing .ov-ex-edit { display: flex; }
    .ov-ex-line.ov-ex-voice { font-size: 12px; line-height: 1.4; }

    /* ── 共通パーツ ── */
    .alert-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .alert-dot.normal { background: #4ade80; }
    .alert-dot.watch { background: #facc15; }
    .alert-dot.critical { background: #f87171; }

    .score-color-green { color: #4ade80; }
    .score-color-yellow { color: #facc15; }
    .score-color-orange { color: #fb923c; }
    .score-color-red { color: #f87171; }
    .score-color-gray { color: #888; }

    .trend-up { color: #f87171; }
    .trend-up::before { content: '\2191'; }
    .trend-down { color: #60a5fa; }
    .trend-down::before { content: '\2193'; }
    .trend-stable { color: #4ade80; }
    .trend-stable::before { content: '\2192'; }

    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-right: 2px;
    }
    .badge-green { background: #4ade80; color: #000; }
    .badge-yellow { background: #facc15; color: #000; }
    .badge-orange { background: #fb923c; color: #000; }
    .badge-red { background: #f87171; color: #fff; }
    .badge-gray { background: #555; color: #ccc; }

    .bar {
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      margin-top: 4px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s;
    }

    .dim { color: var(--text-dim); }

    /* ── 健康コメント ── */
    .pcc-health-comments {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .pcc-hc-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-size: 11px;
      line-height: 1.4;
    }
    .pcc-hc-area {
      flex-shrink: 0;
      color: #facc15;
      font-weight: 600;
      font-size: 10px;
    }
    .pcc-hc-reason {
      color: var(--text-dim);
    }

    /* ── ケア実施カード ── */
    .pcc-care {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .pcc-care-label {
      font-size: 10px;
      color: var(--text-dim);
      margin-right: 2px;
    }
    .care-chip {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .care-chip small {
      font-size: 9px;
      opacity: 0.7;
    }
    .care-chip.care-done {
      background: rgba(74,222,128,0.15);
      color: #4ade80;
    }
    .care-chip.care-skip {
      background: rgba(248,113,113,0.15);
      color: #f87171;
    }
    /* 猫ごと: 個別ケア（項目ごとと同じ選択肢） */
    .pcc-care-individual-wrap {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .pcc-care-inline.inline-form {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      box-sizing: border-box;
    }
    .pcc-care-inline-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      width: 100%;
    }
    .pcc-care-inline .ov-inline-select {
      flex: 1;
      min-width: 0;
      font-size: 12px;
    }
    .pcc-care-inline .ov-inline-date {
      flex: 1;
      min-width: 0;
      font-size: 12px;
    }
    .item-card-body .care-chip {
      max-width: 100%;
      box-sizing: border-box;
      word-break: break-word;
    }
    .ov-care-inline-form {
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
    }
    .ov-care-bulk-block {
      padding: 8px 0 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .ov-care-bulk-hint {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.4;
      margin-bottom: 6px;
    }
    .ov-care-bulk-cbs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      margin-bottom: 8px;
    }
    .ov-care-bulk-lab {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }
    .ov-care-bulk-lab input {
      width: 16px;
      height: 16px;
      accent-color: #5cb8a5;
      flex-shrink: 0;
    }
    .ov-care-bulk-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    .ov-care-bulk-actions .ov-inline-date { flex: 0 0 auto; }
    .ov-care-bulk-actions .btn-ov-care-bulk-save {
      width: auto !important;
      flex: 0 0 auto;
      font-size: 12px;
      padding: 8px 12px;
    }
    .ov-care-sep {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
      padding-top: 6px;
    }
    .med-item-done { color: #4ade80; }
    .med-item-skip { color: #facc15; text-decoration: line-through; opacity: 0.7; }
    .med-item-pending { color: #f87171; }
    .ov-med-item-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
      margin: 4px 0;
      cursor: pointer;
    }
    .item-card-body .ov-med-item-row {
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }
    .item-card-body .ov-med-item-row .ov-med-item-text {
      flex: 1;
      min-width: 0;
      word-break: break-word;
      overflow-wrap: anywhere;
      line-height: 1.35;
    }
    .ov-med-log-cb {
      flex-shrink: 0;
      width: 20px; height: 20px;
      margin: 0;
      accent-color: #4ade80;
      cursor: pointer;
    }
    .ov-med-item-row.med-item-skip { text-decoration: none; opacity: 1; }
    .ov-med-item-row.med-item-skip .ov-med-item-text { text-decoration: line-through; opacity: 0.7; }

    .footer-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      padding-bottom: 24px;
    }
    .footer-actions .btn { flex: 1; font-size: 14px; padding: 14px; }

    /* ── 拠点・ステータスフィルター（二段階）──────────────── */
    .filter-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 10px; }
    .filter-label { font-size: 11px; color: var(--text-dim); min-width: 52px; }
    .loc-bar {
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 14px;
    }
    .loc-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: transparent;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .loc-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .loc-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
      font-size: 11px;
      font-weight: 700;
    }
    .loc-btn.active .loc-count {
      background: rgba(255,255,255,0.25);
    }

    .empty-msg {
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
      padding: 24px;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
    }

    /* ── モーダル ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--bg);
      border-radius: 12px;
      padding: 20px;
      width: 90%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .modal-actions .btn { flex: 1; }
    .form-group { margin-bottom: 12px; }
    .form-label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; display: block; }
    .form-input, .form-select {
      width: 100%;
      box-sizing: border-box;
      background: var(--surface);
      color: var(--text-main);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
    }

    /* はき戻し記録カード */
    .ov-vomit-form { padding: 8px 0 4px; }
    .ov-vomit-row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .ov-vomit-note-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .ov-vomit-count { width: 64px; flex-shrink: 0; }
    .ov-vomit-date { flex-shrink: 0; }
    .ov-vomit-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-top: 8px;
    }
    .ov-vomit-table th {
      font-weight: 600;
      font-size: 11px;
      color: var(--text-dim);
      text-align: left;
      padding: 4px 6px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .ov-vomit-table td {
      padding: 5px 6px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }
    .ov-vomit-note-cell {
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-dim);
    }
    .btn-ov-vomit-del {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: #f87171;
      padding: 2px 4px;
      opacity: 0.7;
    }
    .btn-ov-vomit-del:hover { opacity: 1; }
    .ov-vomit-note { font-size: 13px; }

    /* ── 猫ナビ（フローティングパレット） ── */
    .cat-nav-fab {
      position: fixed;
      bottom: calc(24px + env(safe-area-inset-bottom, 0px));
      left: calc(20px + env(safe-area-inset-left, 0px));
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
      color: #fff;
      font-size: 22px;
      box-shadow: 0 4px 14px rgba(124, 58, 237, 0.45);
      z-index: 900;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cat-nav-fab:active { transform: scale(0.92); }
    .cat-nav-fab.open { background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%); }

    .cat-nav-backdrop {
      position: fixed;
      inset: 0;
      z-index: 899;
      background: rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .cat-nav-backdrop.open { opacity: 1; pointer-events: auto; }

    .cat-nav-palette {
      position: fixed;
      bottom: calc(86px + env(safe-area-inset-bottom, 0px));
      left: calc(16px + env(safe-area-inset-left, 0px));
      width: min(300px, calc(100vw - 32px));
      max-height: 55vh;
      background: var(--surface, #1e1e2e);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 901;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: translateY(16px) scale(0.95);
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .cat-nav-palette.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .cat-nav-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 8px;
      font-weight: 700;
      font-size: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .cat-nav-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 22px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    .cat-nav-tabs {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .cat-nav-tabs::-webkit-scrollbar { display: none; }
    .cat-nav-tab {
      flex-shrink: 0;
      padding: 5px 10px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .cat-nav-tab.active {
      background: var(--primary, #a78bfa);
      color: #fff;
      border-color: var(--primary, #a78bfa);
    }
    .cat-nav-list {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 6px 8px 10px;
    }
    .cat-nav-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 9px 12px;
      border: none;
      background: transparent;
      color: var(--text-main, #e0e0e0);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.12s;
    }
    .cat-nav-item:active { background: rgba(167, 139, 250, 0.18); }
    @keyframes catNavHL {
      0%   { box-shadow: 0 0 0 3px rgba(167,139,250,0.6); }
      100% { box-shadow: 0 0 0 0 rgba(167,139,250,0); }
    }
    .cat-nav-highlight { animation: catNavHL 1.5s ease-out forwards; border-radius: 8px; }
  </style>
</head>
<body>

  <div class="app-sticky-top">
    <div class="header">
      <h1>NYAGI</h1>
      <p>猫一覧</p>
      <nav class="header-nav">
        <a href="dashboard.html">ダッシュボード</a>
        <a href="cats.html" class="nav-current">猫一覧</a>
        <a href="tasks.html">タスク</a>
        <a href="foods.html">フード</a>
        <a href="medicines.html">薬</a>
        <a href="manual.html">📖 マニュアル</a>
      </nav>
    </div>
  </div>

  <div class="page-scroll">

  <div id="loginGate" style="display:none;"></div>

  <div id="mainContent" style="display:none;">
    <div class="loc-bar" id="locBar" style="display:none;"></div>
    <div class="mode-toggle">
      <button id="btnPerCat" class="active">猫ごと</button>
      <button id="btnPerItem">項目ごと</button>
    </div>
    <div id="cardArea"></div>

    <div class="footer-actions">
      <a href="dashboard.html" class="btn btn-primary" style="text-decoration:none;text-align:center;">ダッシュボード</a>
    </div>
  </div>

  <div class="footer">
    &copy; BAKENEKO GAMES
  </div>
  </div><!-- .page-scroll -->

  <!-- 給餌用モーダル（項目ごとカードから直接操作） -->
  <div id="ovPresetApplyModal" class="modal-overlay"></div>
  <div id="ovAddPlanModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">🍽 プランを追加 <span id="ovAddPlanCatName" class="dim" style="font-size:12px;"></span></div>
      <div class="form-group">
        <label class="form-label">食事区分</label>
        <select id="ovApSlot" class="form-select">
          <option value="morning">朝</option>
          <option value="afternoon">昼</option>
          <option value="evening">夕</option>
          <option value="snack">おやつ</option>
          <option value="supplement">サプリメント</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">フード</label>
        <select id="ovApFoodId" class="form-select" style="width:100%;">
          <option value="">-- 選択 --</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">量 (g)</label>
        <input type="number" id="ovApAmount" class="form-input" placeholder="例: 30" step="0.1" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">メモ（任意・改行可）</label>
        <textarea id="ovApNotes" class="form-input" rows="3" style="resize:vertical;min-height:68px;line-height:1.45;" placeholder="食べ残しが多いので少量ずつ 等（Enterで改行）"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="ovCloseAddPlanBtn">キャンセル</button>
        <button type="button" class="btn btn-primary" id="ovSubmitAddPlanBtn">保存</button>
      </div>
    </div>
  </div>
  <div id="ovFeedingLogModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">🍽 給餌ログを記録 <span id="ovFlCatName" class="dim" style="font-size:12px;"></span></div>
      <div class="form-group">
        <label class="form-label">日付</label>
        <input type="date" id="ovFlDate" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">食事区分</label>
        <select id="ovFlSlot" class="form-select">
          <option value="morning">朝</option>
          <option value="afternoon">昼</option>
          <option value="evening">夕</option>
          <option value="snack">おやつ</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">フード</label>
        <select id="ovFlFoodId" class="form-select" style="width:100%;">
          <option value="">-- 選択 --</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">あげた量 (g)</label>
        <input type="number" id="ovFlOfferedG" class="form-input" placeholder="例: 30" step="0.1" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">食べた割合 (%)</label>
        <input type="number" id="ovFlEatenPct" class="form-input" placeholder="例: 90" min="0" max="100">
      </div>
      <div class="form-group">
        <label class="form-label">あげた時刻（JST）</label>
        <input type="time" id="ovFlServedTime" class="form-input" step="60">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="ovCloseFlBtn">キャンセル</button>
        <button type="button" class="btn btn-primary" id="ovSubmitFlBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- あげたモーダル（量調整付き） -->
  <div id="ovQuickFedModal" class="modal-overlay">
    <div class="modal-box" style="max-width:340px;">
      <div class="modal-title" id="ovQfTitle">🍚 あげた記録</div>
      <div class="form-group">
        <label class="form-label">フード</label>
        <div id="ovQfFoodName" style="font-weight:600;padding:4px 0;"></div>
      </div>
      <div class="form-group">
        <label class="form-label">量 (g)</label>
        <input type="number" id="ovQfOfferedG" class="form-input" step="0.1" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">皿に残った量 (g)</label>
        <input type="number" id="ovQfLeftG" class="form-input" step="0.1" min="0" placeholder="空欄＝0%（まだ食べていない）">
        <div class="form-hint" style="font-size:11px;color:var(--text-dim);margin-top:4px;line-height:1.4;">空欄のまま「記録する」＝<b>0%（まだ何も食べていない）</b>として保存。残りgを入れると摂取率を自動計算。完食は残り <b>0</b>。「とりあえずあげた」も同様に0%で保存されます。</div>
      </div>
      <div class="form-group">
        <label class="form-label">あげた時刻（JST）</label>
        <input type="time" id="ovQfServedTime" class="form-input" step="60">
      </div>
      <div class="modal-actions" style="flex-wrap:wrap;gap:8px;">
        <button type="button" class="btn btn-outline" id="ovCloseQfBtn">キャンセル</button>
        <button type="button" class="btn btn-outline" id="ovSubmitQfDeferBtn" title="摂取率はあとから🥄残しやログ編集で入力">とりあえずあげた</button>
        <button type="button" class="btn btn-primary" id="ovSubmitQfBtn">記録する</button>
      </div>
    </div>
  </div>

  <!-- ログ編集モーダル -->
  <div id="ovEditLogModal" class="modal-overlay">
    <div class="modal-box" style="max-width:360px;">
      <div class="modal-title" id="ovElTitle">✏️ 給餌ログ編集</div>
      <div class="form-group">
        <label class="form-label">フード</label>
        <div id="ovElFoodName" style="font-weight:600;padding:4px 0;"></div>
      </div>
      <div class="form-group">
        <label class="form-label">あげた量 (g)</label>
        <input type="number" id="ovElOfferedG" class="form-input" step="0.1" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">食べた割合 (%)</label>
        <input type="number" id="ovElEatenPct" class="form-input" min="0" max="100" value="100">
      </div>
      <div class="form-group">
        <label class="form-label">あげた時刻（JST）</label>
        <input type="time" id="ovElServedTime" class="form-input" step="60">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="ovCloseElBtn">キャンセル</button>
        <button type="button" class="btn btn-primary" id="ovSubmitElBtn">保存</button>
      </div>
    </div>
