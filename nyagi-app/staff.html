<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>スタッフ登録｜NYAGI</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="header">
    <h1>NYAGI</h1>
    <p>スタッフ登録</p>
  </div>

  <div id="loginGate" style="display:none;">
    <div class="card">
      <p style="text-align:center;color:var(--text-dim);font-size:14px;">admin 権限でログインしてください</p>
      <a href="index.html" class="btn btn-primary" style="margin-top:12px;text-decoration:none;text-align:center;">ログイン画面へ</a>
    </div>
  </div>

  <div id="staffContent" style="display:none;">
    <div class="card" style="margin-bottom:16px;">
      <h3 style="margin-top:0;" id="staffFormTitle">新規スタッフ登録</h3>
      <div class="form-group" id="staffIdGroup">
        <label class="form-label">Staff ID *</label>
        <input type="text" id="staffId" class="form-input" placeholder="例: staff_tanaka">
      </div>
      <div class="form-group">
        <label class="form-label">名前 *</label>
        <input type="text" id="staffName" class="form-input" placeholder="例: 田中">
      </div>
      <div class="form-group">
        <label class="form-label">4桁パスワード <span id="staffPasswordReq">*</span></label>
        <input type="password" id="staffPassword" class="form-input" placeholder="例: 0000（編集時は変更時のみ入力）" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">所属</label>
        <select id="staffLocation" class="form-select">
          <option value="cafe">BAKENEKO CAFE</option>
          <option value="nekomata">猫又療養所</option>
          <option value="endo">遠藤宅</option>
          <option value="azukari">預かり隊</option>
          <option value="both">両方</option>
        </select>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="staffAdmin">
          <span>管理者権限</span>
        </label>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" id="submitBtn" style="flex:1;">登録</button>
        <button class="btn btn-outline" id="cancelEditBtn" style="flex:1;display:none;">キャンセル</button>
      </div>
      <div id="staffMessage" style="margin-top:12px;font-size:13px;display:none;"></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0;">登録済みスタッフ</h3>
      <div id="staffList" style="font-size:13px;color:var(--text-dim);">読み込み中...</div>
    </div>

    <div style="margin-top:16px;">
      <a href="index.html" class="btn btn-outline" style="text-decoration:none;text-align:center;display:block;">トップへ戻る</a>
    </div>
  </div>

  <div class="footer">
    &copy; BAKENEKO GAMES
  </div>

  <script src="js/app.js"></script>
  <script src="js/staff.js"></script>
</body>
</html>
