<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <script>
  (function(){if(!navigator.serviceWorker)return;navigator.serviceWorker.getRegistrations().then(function(r){for(var i=0;i<r.length;i++){r[i].update();if(r[i].waiting)r[i].waiting.postMessage({type:'SKIP_WAITING'})}});var f=!1;navigator.serviceWorker.addEventListener('controllerchange',function(){if(!f){f=!0;location.reload()}})})();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NYAGI フードDB</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="voice-console.css">
  <style>
    /* ── タブ ─────────────────────────────────── */
    .tab-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }
    .tab-btn {
      flex: 1;
      background: var(--surface);
      border: none;
      border-radius: 8px;
      padding: 9px 4px;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .tab-btn.active {
      background: var(--primary);
      color: #fff;
      font-weight: 700;
    }

    /* ── スマート検索バー ──────────────────────── */
    .search-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    .search-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--surface-alt);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 13px;
    }
    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus { border-color: var(--primary); outline: none; }
    .search-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .search-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .mic-btn {
      background: var(--surface);
      border: 1px solid var(--surface-alt);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 16px;
      cursor: pointer;
      color: var(--text-dim);
      transition: all 0.2s;
    }
    .mic-btn.recording {
      background: var(--danger);
      border-color: var(--danger);
      color: #fff;
      animation: pulse-mic 1s infinite;
    }
    @keyframes pulse-mic {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .search-hint {
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 12px;
      padding-left: 4px;
    }
    .search-hint span { color: var(--primary); }

    /* ── 候補リスト ──────────────────────────── */
    .candidates {
      background: var(--surface);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 12px;
      display: none;
    }
    .candidates.visible { display: block; }
    .candidates-title {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .candidate-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text);
      transition: background 0.1s;
    }
    .candidate-item:hover, .candidate-item:active {
      background: var(--surface-alt);
    }
    .candidate-item .idx {
      color: var(--text-dim);
      font-size: 10px;
      min-width: 16px;
    }
    .candidate-item .ctitle {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .candidate-item .cdomain {
      font-size: 10px;
      color: var(--primary);
      white-space: nowrap;
    }

    /* ── プレビューカード ─────────────────────── */
    .preview-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
      border: 2px dashed var(--surface-alt);
      display: none;
    }
    .preview-card.visible { display: block; }
    .preview-card.has-data { border-color: var(--primary); }
    .preview-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--primary);
    }
    .preview-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .preview-field {
      flex: 1;
    }
    .preview-field.full { flex-basis: 100%; }
    .preview-label {
      font-size: 10px;
      color: var(--text-dim);
      margin-bottom: 2px;
    }
    .preview-input {
      width: 100%;
      box-sizing: border-box;
      background: var(--bg);
      border: 1px solid var(--surface-alt);
      border-radius: 6px;
      padding: 7px 8px;
      color: var(--text);
      font-size: 12px;
    }
    .preview-input.auto-filled {
      border-color: var(--success);
    }
    .preview-select {
      width: 100%;
      box-sizing: border-box;
      background: var(--bg);
      border: 1px solid var(--surface-alt);
      border-radius: 6px;
      padding: 7px 8px;
      color: var(--text);
      font-size: 12px;
    }
    .preview-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .btn-register {
      flex: 1;
      background: var(--success);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-register:disabled { opacity: 0.5; }
    .btn-cancel {
      background: var(--surface-alt);
      color: var(--text-dim);
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      cursor: pointer;
    }

    /* ── ステータストースト ───────────────────── */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      z-index: 9999;
      transition: transform 0.3s ease;
      max-width: 90%;
      text-align: center;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    .toast.warning { background: var(--warning); color: #1a1a2e; }
    .toast.info { background: var(--surface-alt); }

    /* ── フード一覧 ──────────────────────────── */
    .food-count {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 10px;
    }
    .food-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .food-item {
      background: var(--surface);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .food-item:active { background: var(--surface-alt); }
    .food-icon {
      font-size: 20px;
      min-width: 28px;
      text-align: center;
      padding-top: 2px;
    }
    .food-info { flex: 1; min-width: 0; }
    .food-name {
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .food-meta {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .food-badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      margin-right: 4px;
    }
    .food-badge.dry { background: #b45309; color: #fef3c7; }
    .food-badge.wet { background: #0e7490; color: #cffafe; }
    .food-badge.liquid { background: #7c3aed; color: #ede9fe; }
    .food-badge.semi_moist { background: #059669; color: #d1fae5; }
    .food-badge.treat { background: #db2777; color: #fce7f3; }
    .food-badge.therapy { background: #dc2626; color: #fef2f2; }
    .food-badge.general { background: #2563eb; color: #eff6ff; }
    .food-badge.sp-cat { background: #e94560; color: #fff; }
    .food-badge.sp-dog { background: #3b82f6; color: #fff; }
    .food-kcal {
      font-size: 13px;
      font-weight: 700;
      color: var(--warning);
      white-space: nowrap;
      padding-top: 3px;
    }

    /* ── フィルタ ─────────────────────────────── */
    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .filter-select {
      flex: 1;
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--surface-alt);
      border-radius: 6px;
      padding: 7px 8px;
      color: var(--text);
      font-size: 12px;
    }

    /* ── 詳細モーダル ─────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      justify-content: center;
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--surface);
      border-radius: 16px 16px 0 0;
      padding: 20px;
      width: 100%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--surface-alt);
      font-size: 13px;
    }
    .detail-label { color: var(--text-dim); }
    .detail-value { font-weight: 600; text-align: right; }
    .modal-close {
      display: block;
      margin-top: 16px;
      width: 100%;
      background: var(--surface-alt);
      color: var(--text);
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      cursor: pointer;
    }

    .loading { text-align: center; padding: 30px; color: var(--text-dim); font-size: 13px; }
    .empty-msg { text-align: center; padding: 30px; color: var(--text-dim); font-size: 13px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>NYAGI</h1>
    <p>フードDB ビルドモード</p>
  </div>

  <div id="loginGate" style="display:none;"></div>

  <div id="foodContent" style="display:none;">

    <!-- スマート検索バー -->
    <div class="search-bar">
      <input type="text" id="searchInput" class="search-input" placeholder="製品名 or URL を入力..."
             onkeydown="if(event.key==='Enter')handleSearch()">
      <button id="searchBtn" class="search-btn" onclick="handleSearch()">検索</button>
    </div>
    <div class="search-hint">製品名（例: <span>ロイヤルカナン ユリナリー</span>）、URL を入力 / 右下の🎤で音声検索</div>

    <!-- 検索候補 -->
    <div class="candidates" id="candidateList">
      <div class="candidates-title">検索結果 — 別の候補を選択:</div>
      <div id="candidateItems"></div>
    </div>

    <!-- プレビューカード -->
    <div id="previewCard" class="preview-card">
      <div class="preview-title" id="previewTitle">取得データプレビュー</div>
      <div class="preview-row">
        <div class="preview-field">
          <div class="preview-label">ブランド</div>
          <input type="text" id="pBrand" class="preview-input" placeholder="ロイヤルカナン">
        </div>
        <div class="preview-field">
          <div class="preview-label">製品名 *</div>
          <input type="text" id="pName" class="preview-input" placeholder="製品名">
        </div>
      </div>
      <div class="preview-row">
        <div class="preview-field">
          <div class="preview-label">カテゴリ *</div>
          <select id="pCategory" class="preview-select">
            <option value="療法食">療法食</option>
            <option value="総合栄養食">総合栄養食</option>
            <option value="一般食">一般食</option>
            <option value="おやつ">おやつ</option>
          </select>
        </div>
        <div class="preview-field">
          <div class="preview-label">形態</div>
          <select id="pForm" class="preview-select">
            <option value="dry">ドライ</option>
            <option value="wet">ウェット</option>
            <option value="semi_moist">セミモイスト</option>
            <option value="liquid">リキッド</option>
            <option value="treat">トリーツ</option>
          </select>
        </div>
        <div class="preview-field">
          <div class="preview-label">対象</div>
          <select id="pSpecies" class="preview-select">
            <option value="cat">🐱 猫用</option>
            <option value="dog">🐶 犬用</option>
          </select>
        </div>
      </div>
      <div class="preview-row">
        <div class="preview-field">
          <div class="preview-label">kcal/100g *</div>
          <input type="number" id="pKcal" class="preview-input" placeholder="387" step="0.1">
        </div>
        <div class="preview-field">
          <div class="preview-label">たんぱく質 %</div>
          <input type="number" id="pProtein" class="preview-input" placeholder="32.5" step="0.1">
        </div>
        <div class="preview-field">
          <div class="preview-label">脂質 %</div>
          <input type="number" id="pFat" class="preview-input" placeholder="13.0" step="0.1">
        </div>
      </div>
      <div class="preview-row">
        <div class="preview-field">
          <div class="preview-label">粗繊維 %</div>
          <input type="number" id="pFiber" class="preview-input" placeholder="3.9" step="0.1">
        </div>
        <div class="preview-field">
          <div class="preview-label">水分 %</div>
          <input type="number" id="pWater" class="preview-input" placeholder="6.5" step="0.1">
        </div>
        <div class="preview-field">
          <div class="preview-label">1食(g)</div>
          <input type="number" id="pServing" class="preview-input" placeholder="54" step="1">
        </div>
      </div>
      <div class="preview-row">
        <div class="preview-field">
          <div class="preview-label">用途</div>
          <input type="text" id="pPurpose" class="preview-input" placeholder="下部尿路疾患">
        </div>
        <div class="preview-field">
          <div class="preview-label">フレーバー</div>
          <input type="text" id="pFlavor" class="preview-input" placeholder="チキン">
        </div>
      </div>
      <div class="preview-row">
        <div class="preview-field full">
          <div class="preview-label">メモ</div>
          <input type="text" id="pNotes" class="preview-input" placeholder="特記事項">
        </div>
      </div>
      <div class="preview-actions">
        <button class="btn-cancel" onclick="hidePreview()">キャンセル</button>
        <button class="btn-register" id="registerBtn" onclick="handleRegister()">登録</button>
      </div>
    </div>

    <!-- タブバー -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tabAll" onclick="filterList('all')">全て</button>
      <button class="tab-btn" id="tabTherapy" onclick="filterList('療法食')">療法食</button>
      <button class="tab-btn" id="tabGeneral" onclick="filterList('総合栄養食')">総合栄養食</button>
      <button class="tab-btn" id="tabSnack" onclick="filterList('一般食')">一般食/おやつ</button>
    </div>
    <div class="tab-bar" style="margin-top:-8px;">
      <button class="tab-btn active" id="spAll" onclick="filterSpecies('all')">全動物</button>
      <button class="tab-btn" id="spCat" onclick="filterSpecies('cat')">🐱 猫用</button>
      <button class="tab-btn" id="spDog" onclick="filterSpecies('dog')">🐶 犬用</button>
    </div>

    <!-- 一覧 -->
    <div class="food-count" id="foodCount"></div>
    <div class="food-grid" id="foodGrid">
      <div class="loading">読み込み中...</div>
    </div>
  </div>

  <!-- 詳細モーダル -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal-box">
      <div class="modal-title" id="modalTitle"></div>
      <div id="modalBody"></div>
      <button class="modal-close" onclick="closeModal()">閉じる</button>
    </div>
  </div>

  <!-- トースト -->
  <div class="toast" id="toast"></div>

  <div class="footer-actions">
    <a href="dashboard.html" class="btn btn-outline">ダッシュボード</a>
    <a href="medicines.html" class="btn btn-outline">💊薬</a>
    <a href="cats.html" class="btn btn-outline">猫一覧</a>
  </div>

  <footer class="footer">&copy; BAKENEKO GAMES</footer>

  <script src="config.js"></script>
  <script src="js/login-gate.js"></script>
  <script src="js/app.js"></script>
  <script src="js/foods.js"></script>
  <script src="js/voice-console.js"></script>
</body>
</html>
