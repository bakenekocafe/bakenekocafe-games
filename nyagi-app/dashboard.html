<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <script>
  (function(){if(!navigator.serviceWorker)return;navigator.serviceWorker.getRegistrations().then(function(r){for(var i=0;i<r.length;i++){r[i].update();if(r[i].waiting)r[i].waiting.postMessage({type:'SKIP_WAITING'})}});var f=!1;navigator.serviceWorker.addEventListener('controllerchange',function(){if(!f){f=!0;location.reload()}})})();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NYAGI ダッシュボード</title>
  <link rel="manifest" href="manifest.json?v=213">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="style.css?v=209">
  <script src="js/nyagi-fixed-header.js?v=209" defer></script>
  <script src="js/nyagi-cache-clear.js?v=209" defer></script>
  <link rel="stylesheet" href="voice-console.css?v=213">
  <style>
    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin: 20px 0 10px;
      padding-left: 4px;
    }
    .dash-fold-title {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
      -webkit-user-select: none;
    }
    .dash-fold-title::after {
      content: '▲';
      font-size: 10px;
      opacity: 0.4;
      transition: transform 0.2s;
      margin-right: 4px;
    }
    .dash-fold-title.folded::after {
      transform: rotate(180deg);
    }

    /* 献立「あげた・残し」未完了（折りたたみ＋リング＋猫チップ） */
    .dash-feed-fold-title {
      flex-wrap: nowrap;
      gap: 8px;
    }
    .dash-feed-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex: 1;
      min-width: 0;
      gap: 10px;
    }
    .dash-feed-title-text {
      flex: 1;
      min-width: 0;
      line-height: 1.35;
    }
    .dash-feed-ring-wrap {
      flex-shrink: 0;
      color: var(--text-main, #e8e8ef);
    }
    .dash-feed-ring-svg {
      display: block;
      vertical-align: middle;
    }
    .dash-feed-ring-pct {
      font-family: system-ui, -apple-system, sans-serif;
    }
    .dash-feed-inc-card {
      padding: 12px 14px;
    }
    .dash-feed-allok {
      text-align: center;
      font-size: 13px;
      color: #86efac;
      padding: 6px 0;
    }
    .dash-feed-chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .dash-feed-chip {
      display: inline-block;
      max-width: 100%;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      color: var(--text-main, #f4f4f5);
      background: rgba(99, 102, 241, 0.22);
      border: 1px solid rgba(129, 140, 248, 0.35);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .dash-feed-chip:active {
      opacity: 0.85;
    }
    .dash-feed-chip--more {
      cursor: default;
      background: var(--surface-alt, rgba(255,255,255,0.06));
      border-color: rgba(255,255,255,0.1);
      color: var(--text-dim, #a1a1aa);
    }
    .dash-feed-hint {
      margin-top: 10px;
      font-size: 11px;
      color: var(--text-dim, #a1a1aa);
      text-align: center;
    }

    /* 投薬「お薬 未完了」（折りたたみ＋リング＋猫チップ） */
    .dash-med-fold-title {
      flex-wrap: nowrap;
      gap: 8px;
    }
    .dash-med-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex: 1;
      min-width: 0;
      gap: 10px;
    }
    .dash-med-title-text {
      flex: 1;
      min-width: 0;
      line-height: 1.35;
    }
    .dash-med-ring-wrap {
      flex-shrink: 0;
      color: var(--text-main, #e8e8ef);
    }
    .dash-med-ring-svg {
      display: block;
      vertical-align: middle;
    }
    .dash-med-ring-pct {
      font-family: system-ui, -apple-system, sans-serif;
    }
    .dash-med-inc-card {
      padding: 12px 14px;
    }
    .dash-med-allok {
      text-align: center;
      font-size: 13px;
      color: #86efac;
      padding: 6px 0;
    }
    .dash-med-chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .dash-med-chip {
      display: inline-block;
      max-width: 100%;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      color: var(--text-main, #f4f4f5);
      background: rgba(168, 85, 247, 0.22);
      border: 1px solid rgba(192, 132, 252, 0.35);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .dash-med-chip:active {
      opacity: 0.85;
    }
    .dash-med-chip--more {
      cursor: default;
      background: var(--surface-alt, rgba(255,255,255,0.06));
      border-color: rgba(255,255,255,0.1);
      color: var(--text-dim, #a1a1aa);
    }
    .dash-med-hint {
      margin-top: 10px;
      font-size: 11px;
      color: var(--text-dim, #a1a1aa);
      text-align: center;
    }

    .alert-card {
      background: var(--surface);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .alert-card.critical { border-left: 4px solid #f87171; }
    .alert-card.watch { border-left: 4px solid #facc15; }

    .alert-icon {
      font-size: 24px;
      flex-shrink: 0;
    }
    .alert-body { flex: 1; }
    .alert-name { font-weight: 600; font-size: 15px; }
    .alert-reason { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .alert-until { font-size: 11px; color: #facc15; }

    .btn-edit-small {
      background: transparent; border: 1px solid var(--surface-alt); border-radius: 4px;
      padding: 2px 6px; font-size: 12px; cursor: pointer; opacity: 0.8;
      text-decoration: none; color: inherit; display: inline-block;
    }
    .btn-edit-small:hover { opacity: 1; }

    .action-item {
      background: var(--surface);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .action-item.overdue { border-left: 4px solid #f87171; }
    .action-item.today { border-left: 4px solid #facc15; }
    .action-title { font-weight: 600; }
    .action-meta { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

    .anomaly-item {
      background: var(--surface);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      border-left: 4px solid #fb923c;
      font-size: 13px;
    }
    .anomaly-cat { font-weight: 600; color: var(--primary); }
    .anomaly-text { margin-top: 4px; color: var(--text-dim); }
    .anomaly-layer { font-size: 11px; background: var(--surface-alt); padding: 2px 6px; border-radius: 4px; color: var(--text-dim); }

    .unreported-item {
      background: var(--surface);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      border-left: 4px solid #fb923c;
    }
    .unreported-name { font-weight: 600; font-size: 14px; }
    .unreported-missing { font-size: 12px; color: #fb923c; margin-top: 4px; }

    .footer-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      padding-bottom: 24px;
    }
    .footer-actions .btn { flex: 1; font-size: 14px; padding: 14px; }

    .empty-msg {
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
      padding: 16px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
    }

    /* ── 拠点・ステータスフィルター（二段階）──────────────── */
    .filter-section { margin-bottom: 12px; }
    .filter-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
    .loc-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .loc-btn {
      padding: 7px 12px;
      border: 1.5px solid var(--surface-alt);
      border-radius: 20px;
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .loc-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .loc-btn .loc-count {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 0 5px;
      margin-left: 4px;
      font-size: 10px;
    }
    .loc-btn.active .loc-count {
      background: rgba(255,255,255,0.3);
    }

    /* フィルタ内の全猫表示時も画面が伸びすぎないようカード内スクロール */
    .dash-health-score-list {
      max-height: min(70vh, 520px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

  </style>
</head>
<body>

  <div class="app-sticky-top">
    <div class="header">
      <h1>NYAGI</h1>
      <p>定時確認ダッシュボード</p>
      <nav class="header-nav">
        <a href="dashboard.html" class="nav-current">ダッシュボード</a>
        <a href="cats.html">猫一覧</a>
        <a href="tasks.html">タスク</a>
        <a href="foods.html">フード</a>
        <a href="medicines.html">薬</a>
        <a href="manual.html">📖 マニュアル</a>
      </nav>
    </div>
  </div>

  <div id="loginGate" style="display:none;"></div>

  <div id="dashContent" style="display:none;">
    <div class="filter-section">
      <div class="filter-label">拠点</div>
      <div class="loc-bar" id="locBar"></div>
    </div>
    <div class="filter-section">
      <div class="filter-label">ステータス</div>
      <div class="loc-bar status-bar" id="statusBar"></div>
    </div>

    <div id="dashView"></div>

    <div class="footer-actions">
      <a href="cats.html" class="btn btn-primary" style="text-decoration:none;text-align:center;">猫一覧</a>
      <a href="tasks.html" class="btn btn-outline" style="text-decoration:none;text-align:center;">タスク</a>
      <a href="foods.html" class="btn btn-outline" style="text-decoration:none;text-align:center;">フードDB</a>
      <a href="medicines.html" class="btn btn-outline" style="text-decoration:none;text-align:center;">💊薬</a>
      <a href="staff.html" class="btn btn-outline" style="text-decoration:none;text-align:center;">スタッフ</a>
      <a href="manual.html" class="btn btn-outline" style="text-decoration:none;text-align:center;">📖 マニュアル</a>
    </div>

    <button type="button" id="forceClearBtn" onclick="forceClearCache(this)" style="width:100%;margin-top:8px;padding:10px;background:transparent;border:1px dashed rgba(255,255,255,0.15);border-radius:8px;color:var(--text-dim);font-size:12px;cursor:pointer;">🔄 表示がおかしい場合：キャッシュクリア</button>
  </div>

  <div class="footer">
    &copy; BAKENEKO GAMES
  </div>

  <script src="config.js?v=213"></script>
  <script src="js/nyagi-boot-overlay.js?v=213"></script>
  <script src="js/login-gate.js?v=213"></script>
  <script src="js/app.js?v=219"></script>
  <script src="js/dashboard.js?v=216"></script>
  <script src="js/voice-console.js?v=216"></script>
</body>
</html>
