<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>アカウント設定｜引き受け申請</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="intake-body">
  <div class="intake-wrap">
    <header class="intake-header">
      <h1>アカウント設定</h1>
      <p>招待メールのリンクからお進みください</p>
    </header>

    <div id="alertBox"></div>

    <div id="stepVerify" class="intake-card" style="display:none;">
      <p class="intake-meta" id="verifyHint"></p>
      <p style="margin-top:12px;"><a class="intake-link" href="login.html">すでに登録済みの方はログイン</a></p>
    </div>

    <form id="setupForm" class="intake-card" style="display:none;">
      <h2>パスワードと本人情報</h2>
      <div class="intake-field">
        <label for="password">パスワード（8文字以上）</label>
        <input type="password" id="password" name="password" autocomplete="new-password" required minlength="8">
      </div>
      <div class="intake-field">
        <label for="name">お名前</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="intake-field">
        <label for="phone">電話番号</label>
        <input type="tel" id="phone" name="phone">
      </div>
      <div class="intake-field">
        <label for="address">住所</label>
        <textarea id="address" name="address" rows="2"></textarea>
      </div>
      <div class="intake-field">
        <label for="organization">団体名（任意）</label>
        <input type="text" id="organization" name="organization">
      </div>
      <div class="intake-field">
        <label>
          <input type="checkbox" id="agree" value="1" required>
          <a href="https://www.bakenekocafe.studio/terms.html" target="_blank" rel="noopener">利用規約</a>
          および
          <a href="https://www.bakenekocafe.studio/privacy.html" target="_blank" rel="noopener">プライバシーポリシー</a>
          に同意します
        </label>
      </div>
      <button type="submit" class="intake-btn intake-btn-primary" id="submitBtn">登録してはじめる</button>
    </form>

    <p class="intake-footer-note">
      トークンが無い・期限切れの場合は、担当スタッフにお問い合わせください。<br>
      <a href="https://www.bakenekocafe.studio/terms.html" target="_blank" rel="noopener">利用規約</a>
      ・<a href="https://www.bakenekocafe.studio/privacy.html" target="_blank" rel="noopener">プライバシー</a>
      ・<a href="https://www.bakenekocafe.studio/contact.html" target="_blank" rel="noopener">お問い合わせ</a>
    </p>
  </div>

  <script src="../config.js"></script>
  <script src="js/intake-common.js"></script>
  <script>
  (function () {
    var token = '';
    try {
      var u = new URL(location.href);
      token = (u.searchParams.get('token') || '').trim();
    } catch (_) {}

    var alertBox = document.getElementById('alertBox');
    var stepVerify = document.getElementById('stepVerify');
    var verifyHint = document.getElementById('verifyHint');
    var setupForm = document.getElementById('setupForm');
    var submitBtn = document.getElementById('submitBtn');

    function showErr(msg) {
      alertBox.innerHTML = '<div class="intake-alert intake-alert-error">' + window.intakeEsc(msg) + '</div>';
    }
    function clearAlert() {
      alertBox.innerHTML = '';
    }

    if (!token) {
      showErr('招待リンク（token）が見つかりません。メール内のURLから開いてください。');
      return;
    }

    window
      .intakeFetch('POST', '/verify-token', { token: token })
      .then(function (d) {
        clearAlert();
        verifyHint.textContent = '登録メール: ' + (d.email_hint || '***');
        stepVerify.style.display = 'block';
        if (d.already_registered) {
          verifyHint.textContent += ' — この招待は既に登録済みです。ログインしてください。';
          setupForm.style.display = 'none';
          return;
        }
        setupForm.style.display = 'block';
      })
      .catch(function (e) {
        showErr(e.message || 'トークンの確認に失敗しました');
      });

    setupForm.addEventListener('submit', function (ev) {
      ev.preventDefault();
      clearAlert();
      var pwd = document.getElementById('password').value;
      var agree = document.getElementById('agree').checked;
      var payload = {
        token: token,
        password: pwd,
        name: document.getElementById('name').value.trim(),
        phone: document.getElementById('phone').value.trim() || null,
        address: document.getElementById('address').value.trim() || null,
        organization: document.getElementById('organization').value.trim() || null,
        agree_terms: agree,
      };
      submitBtn.disabled = true;
      window
        .intakeFetch('POST', '/setup', payload)
        .then(function (d) {
          if (d.session_token) window.intakeSetSession(d.session_token);
          location.href = 'index.html';
        })
        .catch(function (e) {
          showErr(e.message || '登録に失敗しました');
          submitBtn.disabled = false;
        });
    });
  })();
  </script>
</body>
</html>
